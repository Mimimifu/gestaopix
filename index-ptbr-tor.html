<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GestãoPIX | Catálogo para Rede Tor</title>
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --text: #0f172a;
            --primary: #2563eb; --border: #e2e8f0; --danger: #ef4444;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); overflow: hidden; font-family: sans-serif; }
        body { display: flex; flex-direction: row; transition: 0.3s; }
        body.menu-right { flex-direction: row-reverse; }
        aside { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; z-index: 100; height: 100vh; }
        body.menu-right aside { border-right: none; border-left: 1px solid var(--border); }
        body.collapsed aside { width: 60px; padding: 10px; }
        body.collapsed .txt { display: none; }
        main { flex: 1; height: 100vh; overflow-y: auto; padding: 15px; }
        .header { display: flex; gap: 8px; margin-bottom: 15px; background: var(--surface); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        input, select { padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; background: #eee; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-p { background: var(--primary); color: white; width: 100%; }
        .btn-s { background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: 5px; }
        #chat-win { position: fixed; bottom: 20px; right: 20px; width: 280px; height: 350px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: none; flex-direction: column; z-index: 2000; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        #msgs { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; font-size: 0.85rem; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 10px; }
        .modal-c { background: var(--surface); padding: 20px; border-radius: 12px; width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }
        body.view-mode .admin, body.view-mode .card-admin-btns, body.view-mode .config-btns { display: none !important; }
        @media (max-width: 600px) {
            aside { position: fixed; bottom: 0; width: 100% !important; height: 60px; flex-direction: row; border-top: 1px solid var(--border); padding: 5px; justify-content: space-around; }
            main { padding-bottom: 70px; }
            .txt, .nav-head { display: none !important; }
        }
    </style>
</head>
<body>

    <aside id="menu">
        <div class="nav-head" style="display: flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
            <span class="txt" style="font-weight: 900;">GestãoPIX</span>
            <button class="btn-s" style="width: 35px; padding: 5px;" onclick="document.body.classList.toggle('collapsed')">☰</button>
        </div>
        <button class="btn-s" onclick="openM('m-join')">🌐 <span class="txt">Entrar na Sala</span></button>
        <div class="admin" style="display:flex; flex-direction:column; gap:5px; margin-top:10px;">
            <button class="btn-p" onclick="openEdit()">➕ <span class="txt">Novo Item</span></button>
            <button class="btn-s" onclick="openM('m-host')">📡 <span class="txt">Live Host</span></button>
            <button class="btn-s" onclick="document.getElementById('f-in').click()">📥 <span class="txt">Importar</span></button>
            <button class="btn-s" onclick="exportData()">📤 <span class="txt">Exportar</span></button>
            <input type="file" id="f-in" style="display:none" onchange="importData(event)">
        </div>
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 5px;">
            <button class="btn-s" onclick="toggleTheme()">🌓 <span class="txt">Tema</span></button>
            <button class="btn-s" onclick="toggleChat()">💬 <span class="txt">Chat</span> <span id="notif" style="display:none; color:red">●</span></button>
        </div>
    </aside>

    <main>
        <div class="header">
            <input type="text" id="srch" placeholder="Buscar..." style="flex:2" oninput="render()">
            <select id="filt" style="flex:1" onchange="render()"><option>Tudo</option></select>
        </div>
        <div id="status" style="font-size: 0.65rem; color: var(--primary); margin-bottom: 10px; font-weight: bold;">MODO LOCAL (OFFLINE)</div>
        <div class="grid" id="list"></div>
    </main>

    <div id="chat-win">
        <div style="padding: 10px; border-bottom: 1px solid var(--border); font-weight: bold; display: flex; justify-content: space-between;">
            <span>Suporte/Chat</span> <span onclick="toggleChat()" style="cursor:pointer">×</span>
        </div>
        <div id="msgs"></div>
        <div style="padding: 10px; display: flex; gap: 5px;">
            <input type="text" id="chat-i" style="flex:1" onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()" style="background:var(--primary); color:white; padding:5px;">></button>
        </div>
    </div>

    <div id="m-edit" class="modal"><div class="modal-c">
        <h3>Produto</h3><input type="hidden" id="e-id"><input type="text" id="e-n" placeholder="Nome"><input type="text" id="e-c" placeholder="Categoria"><input type="number" id="e-p" placeholder="Preço"><input type="text" id="e-x" placeholder="Chave PIX"><input type="file" id="e-i">
        <button class="btn-p" onclick="save()">Salvar</button><button class="btn-s" onclick="closeM()">Sair</button>
    </div></div>

    <div id="m-pay" class="modal"><div class="modal-c">
        <h3 id="p-n"></h3><div id="p-x" style="background:var(--bg); padding:10px; border:2px dashed var(--primary); font-size:0.8rem; cursor:pointer; word-break: break-all;" onclick="copy()"></div>
        <h2 id="p-p" style="color:var(--primary); text-align:center"></h2><button class="btn-s" onclick="closeM()">Fechar</button>
    </div></div>

    <div id="m-join" class="modal"><div class="modal-c">
        <h3>Entrar na Sala</h3><input type="text" id="in-id" placeholder="ID do Lojista"><button class="btn-p" onclick="conn('client')">Conectar</button><button class="btn-s" onclick="closeM()">Cancelar</button>
    </div></div>

    <div id="m-host" class="modal"><div class="modal-c">
        <h3>Criar Sala Live</h3><input type="text" id="ho-id" placeholder="Nome da Loja"><button class="btn-p" onclick="conn('host')">Iniciar</button><button class="btn-s" onclick="closeM()">Cancelar</button>
    </div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>

    const sb = supabase.createClient("https://mkgfmctofpspphkdbfoe.supabase.co", "sb_publishable_RVv1dbCcAZHpm5CkoQyDEw_XN4Sn665"); 
    
    let db = JSON.parse(localStorage.getItem('gpx_db')) || [];
    let channel, isHost = false;

    // Garanta que estas funções estejam FORA de qualquer outra função
    function openM(id) { 
        const el = document.getElementById(id);
        if(el) el.style.display = 'flex'; 
    }

    function closeM() { 
        document.querySelectorAll('.modal').forEach(m => m.style.display='none'); 
    }

    function conn(mode) {
        const roomId = mode === 'host' ? document.getElementById('ho-id').value : document.getElementById('in-id').value;
        if(!roomId) return; closeM();
        
        document.getElementById('status').innerText = "CONECTANDO...";

        // Usando a variável 'sb' definida acima
        channel = sb.channel('room_' + roomId, { config: { broadcast: { self: true } } });

        channel
            .on('broadcast', { event: 'sync' }, (payload) => {
                const d = payload.payload;
                if(d.type === 'db') { db = d.data; document.body.classList.add('view-mode'); render(); updFilt(); }
                if(d.type === 'chat') { addMsg(d.data, 'them'); document.getElementById('notif').style.display='inline'; }
                if(d.type === 'req' && isHost) push();
            })
            .subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    document.getElementById('status').innerText = "LIVE: " + roomId;
                    if(mode === 'client') channel.send({ type: 'broadcast', event: 'sync', payload: { type: 'req' } });
                    else isHost = true;
                }
            });
    }

        function push() {
            if(channel && isHost) channel.send({ type: 'broadcast', event: 'sync', payload: { type: 'db', data: db } });
        }

        function sendChat() {
            const i = document.getElementById('chat-i');
            if(!i.value || !channel) return;
            channel.send({ type: 'broadcast', event: 'sync', payload: { type: 'chat', data: i.value } });
            addMsg(i.value, 'me'); i.value = '';
        }

        // Funções de Interface
        function render() {
            const list = document.getElementById('list');
            const q = document.getElementById('srch').value.toLowerCase();
            const f = document.getElementById('filt').value;
            const res = db.filter(p => p.name.toLowerCase().includes(q) && (f === 'Tudo' || p.cat === f));

            list.innerHTML = res.map(p => `
                <div class="card">
                    ${p.img ? `<img src="${p.img}">` : `<div style="height:110px;background:#eee;border-radius:8px"></div>`}
                    <small style="font-weight:bold; color:var(--primary)">${p.cat}</small>
                    <strong style="font-size:0.85rem">${p.name}</strong>
                    <span style="color:var(--primary); font-weight:bold">R$ ${parseFloat(p.price).toFixed(2)}</span>
                    <button class="btn-p" onclick="openPay('${p.id}')">🛒 Comprar</button>
                    <div class="card-admin-btns" style="display:flex; gap:4px; margin-top:5px">
                        <button class="btn-s" onclick="openEdit('${p.id}')">✏️</button>
                        <button class="btn-s" style="color:var(--danger)" onclick="del('${p.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

function save() {
    const id = document.getElementById('e-id').value;
    const file = document.getElementById('e-i').files[0];

    // Função interna para processar e salvar os dados
    const act = (img = null) => {
        const p = { 
            id: id || Date.now(), 
            name: document.getElementById('e-n').value, 
            cat: document.getElementById('e-c').value || 'Geral', 
            price: document.getElementById('e-p').value, 
            pix: document.getElementById('e-x').value, 
            img: img || (id ? db.find(x => x.id == id).img : null) 
        };
        
        if(id) db = db.map(x => x.id == id ? p : x); else db.push(p);
        
        localStorage.setItem('gpx_db', JSON.stringify(db));
        closeM(); render(); updFilt(); push();
    };

    // Se houver um arquivo, comprimimos antes de salvar
    if (file) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const imgEl = new Image();
            imgEl.src = e.target.result;
            imgEl.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // Define o tamanho máximo (400px preservando a proporção)
                const MAX_SIZE = 400;
                let w = imgEl.width;
                let h = imgEl.height;

                if (w > h) {
                    if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; }
                } else {
                    if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
                }

                canvas.width = w;
                canvas.height = h;
                ctx.drawImage(imgEl, 0, 0, w, h);

                // Exporta como WebP com 50% de qualidade (Equilíbrio para bater ~20KB)
                const compressedBase64 = canvas.toDataURL('image/webp', 0.5);
                act(compressedBase64);
            };
        };
    } else {
        act();
    }
}

        function addMsg(t, s) {
            const d = document.createElement('div'); d.innerText = t;
            d.style.cssText = `padding:8px; border-radius:8px; max-width:80%; margin-bottom:5px; align-self: ${s==='me'?'flex-end':'flex-start'}; background: ${s==='me'?'var(--primary)':'var(--border)'}; color: ${s==='me'?'white':'var(--text)'};`;
            document.getElementById('msgs').appendChild(d);
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
        }

        function openEdit(id = null) {
            if(id) {
                const p = db.find(x => x.id == id);
                document.getElementById('e-id').value = p.id; document.getElementById('e-n').value = p.name;
                document.getElementById('e-c').value = p.cat; document.getElementById('e-p').value = p.price;
                document.getElementById('e-x').value = p.pix;
            } else {
                document.getElementById('e-id').value = ''; document.querySelectorAll('#m-edit input').forEach(i => i.value = '');
            }
            openM('m-edit');
        }

        function del(id) { if(confirm("Apagar?")) { db = db.filter(x => x.id != id); localStorage.setItem('gpx_db', JSON.stringify(db)); render(); updFilt(); push(); } }
        function openPay(id) { const p = db.find(x => x.id == id); document.getElementById('p-n').innerText = p.name; document.getElementById('p-x').innerText = p.pix; document.getElementById('p-p').innerText = "R$ " + parseFloat(p.price).toFixed(2); openM('m-pay'); }
        function updFilt() { const cats = ['Tudo', ...new Set(db.map(x => x.cat))]; document.getElementById('filt').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join(''); }
        function toggleChat() { const w = document.getElementById('chat-win'); w.style.display = w.style.display === 'flex' ? 'none' : 'flex'; document.getElementById('notif').style.display='none'; }
        function copy() { navigator.clipboard.writeText(document.getElementById('p-x').innerText); alert("Copiado!"); }
        function exportData() { const a=document.createElement('a'); a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(db)); a.download="gestaopix.json"; a.click(); }
        function importData(e) { const r=new FileReader(); r.onload=ev => { db=JSON.parse(ev.target.result); localStorage.setItem('gpx_db', JSON.stringify(db)); render(); updFilt(); push(); }; r.readAsText(e.target.files[0]); }
        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function toggleSide() { document.body.classList.toggle('menu-right'); }

        window.onload = () => { updFilt(); render(); };
    </script>
</body>
</html>
