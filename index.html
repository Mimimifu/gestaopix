<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GestãoPIX | Final</title>
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --text: #0f172a;
            --primary: #2563eb; --border: #e2e8f0; --danger: #ef4444;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s; }
        body { font-family: sans-serif; display: flex; flex-direction: row; }
        body.menu-right { flex-direction: row-reverse; }

        aside { 
            width: 240px; background: var(--surface); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 15px; z-index: 100; height: 100vh;
        }
        body.menu-right aside { border-right: none; border-left: 1px solid var(--border); }
        body.collapsed aside { width: 60px; padding: 10px; }
        body.collapsed .txt { display: none; }

        main { flex: 1; height: 100vh; overflow-y: auto; padding: 15px; }
        .header { display: flex; gap: 8px; margin-bottom: 15px; background: var(--surface); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        input, select { padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; background: #eee; }

        button { cursor: pointer; border: none; border-radius: 6px; padding: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn-p { background: var(--primary); color: white; width: 100%; }
        .btn-s { background: transparent; border: 1px solid var(--border); color: var(--text); width: 100%; margin-top: 5px; }

        #chat-win { 
            position: fixed; bottom: 20px; right: 20px; width: 280px; height: 350px; 
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px; 
            display: none; flex-direction: column; z-index: 2000; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        body.menu-right #chat-win { right: auto; left: 20px; }
        #msgs { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; font-size: 0.85rem; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 10px; }
        .modal-c { background: var(--surface); padding: 20px; border-radius: 12px; width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }

        /* MODO VISUALIZAÇÃO: Esconde ferramentas de dono */
        body.view-mode .admin, 
        body.view-mode .card-admin-btns,
        body.view-mode .config-btns { display: none !important; }

        @media (max-width: 600px) {
            aside { position: fixed; bottom: 0; width: 100% !important; height: 60px; flex-direction: row; border: none; border-top: 1px solid var(--border); padding: 5px; justify-content: space-around; }
            main { padding-bottom: 70px; }
            .txt, .nav-head { display: none !important; }
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10149/10149458.png">	
</head>
<body>

    <aside id="menu">
        <div class="nav-head" style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
            <span class="txt" style="font-weight: 900;">GestãoPIX</span>
            <button class="btn-s" style="width: 35px; padding: 5px;" onclick="document.body.classList.toggle('collapsed')">☰</button>
        </div>
        
        <button class="btn-s" id="btn-enter" onclick="openM('m-join')">🌐 <span class="txt">Entrar na Sala</span></button>
        
        <div class="admin" id="admin-tools" style="display:flex; flex-direction:column; gap:5px; margin-top:10px;">
            <button class="btn-p" onclick="openEdit()">➕ <span class="txt">Novo Item</span></button>
            <button class="btn-s" onclick="openM('m-host')">📡 <span class="txt">Live Host</span></button>
            <button class="btn-s" onclick="document.getElementById('f-in').click()">📥 <span class="txt">Importar</span></button>
            <button class="btn-s" onclick="exportData()">📤 <span class="txt">Exportar</span></button>
            <input type="file" id="f-in" style="display:none" onchange="importData(event)">
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 5px;">
            <div class="config-btns" style="display: flex; flex-direction: column; gap: 5px;">
		<button class="btn-s" style="color: #e91e63; border-color: #f8bbd0;" onclick="openM('m-donate')">❤️ <span class="txt">Apoiar Projeto</span></button>
                <button class="btn-s" style="font-size: 0.7rem; padding:5px" onclick="toggleTheme()">🌓 <span class="txt">Tema</span></button>
                <button class="btn-s" style="font-size: 0.7rem; padding:5px" onclick="toggleSide()">↔️ <span class="txt">Lado</span></button>
            </div>
            <button class="btn-s" onclick="toggleChat()">💬 <span class="txt">Chat</span> <span id="notif" style="display:none; color:red">●</span></button>
        </div>
    </aside>

    <main>
        <div class="header">
            <input type="text" id="srch" placeholder="Buscar..." style="flex:2" oninput="render()">
            <select id="filt" style="flex:1" onchange="render()"><option>Tudo</option></select>
        </div>
        <div id="status" style="font-size: 0.6rem; color: var(--primary); margin-bottom: 10px; font-weight: bold; text-transform: uppercase;">Modo Local</div>
        <div class="grid" id="list"></div>
    </main>

    <div id="chat-win">
        <div style="padding: 10px; border-bottom: 1px solid var(--border); font-weight: bold; display: flex; justify-content: space-between;">
            <span>Suporte</span> <span onclick="toggleChat()" style="cursor:pointer">×</span>
        </div>
        <div id="msgs"></div>
        <div style="padding: 10px; display: flex; gap: 5px;"><input type="text" id="chat-i" style="flex:1" onkeypress="if(event.key==='Enter') sendChat()"><button onclick="sendChat()" style="background:var(--primary); color:white; padding: 5px 10px; border-radius: 6px;">></button></div>
    </div>

    <div id="m-edit" class="modal"><div class="modal-c">
        <h3>Produto</h3><input type="hidden" id="e-id"><input type="text" id="e-n" placeholder="Nome"><input type="text" id="e-c" placeholder="Categoria"><input type="number" id="e-p" placeholder="Preço"><input type="text" id="e-x" placeholder="Chave PIX"><input type="file" id="e-i">
        <button class="btn-p" onclick="save()">Salvar</button><button class="btn-s" onclick="closeM()">Sair</button>
    </div></div>

    <div id="m-pay" class="modal"><div class="modal-c">
        <h3 id="p-n"></h3><div id="p-x" style="background:var(--bg); padding:10px; border:2px dashed var(--primary); font-size:0.8rem; cursor:pointer; word-break: break-all;" onclick="copy()"></div>
        <h2 id="p-p" style="color:var(--primary); text-align:center"></h2><button class="btn-s" onclick="closeM()">Fechar</button>
    </div></div>

    <div id="m-join" class="modal"><div class="modal-c">
        <h3>Entrar na Sala</h3><input type="text" id="in-id" placeholder="ID do Lojista"><button class="btn-p" onclick="conn('client')">Conectar</button><button class="btn-s" onclick="closeM()">Cancelar</button>
    </div></div>

    <div id="m-host" class="modal"><div class="modal-c">
        <h3>Criar Sala</h3><input type="text" id="ho-id" placeholder="Nome da Loja"><button class="btn-p" onclick="conn('host')">Iniciar</button><button class="btn-s" onclick="closeM()">Cancelar</button>
    </div></div>



<div id="m-donate" class="modal">
    <div class="modal-c" style="max-width: 400px; text-align: center;">
        <h3 style="margin-bottom: 15px;">Fortaleça o GestãoPIX</h3>
        
        <a href="https://www.patreon.com/c/WorldsEcology/membership" target="_blank" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 15px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px;">
            <img src="https://c5.patreon.com/external/logo/downloads_logomark_color_on_white.png" width="40" alt="Patreon">
            <div style="text-align: left;">
                <strong>Patreon</strong><br>
                <small>Torne-se um assinante patrocinando o projeto.</small>
            </div>
        </a>

        <a href="https://ko-fi.com/lbzcds" target="_blank" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 15px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px;">
            <img src="https://storage.ko-fi.com/cdn/cup-border.png" width="40" alt="Ko-fi">
            <div style="text-align: left;">
                <strong>Ko-fi</strong><br>
                <small>Gostou da ideia? Pague um café para o código.</small>
            </div>
        </a>

        <div style="padding: 15px; border: 2px dashed var(--primary); border-radius: 8px; background: var(--bg);">
            <strong>FORTALECE NO PIX</strong><br>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=2c04642f-fbb7-40b0-9efb-434184b133f4" style="margin: 10px 0; width: 120px;">
            <div id="pix-key-dev" style="font-size: 0.7rem; word-break: break-all; cursor: pointer; font-weight: bold; color: var(--primary);" onclick="copyDevPix()">
                2c04642f-fbb7-40b0-9efb-434184b133f4
            </div>
            <small style="display:block; margin-top:5px; font-size: 0.6rem;">(Clique para copiar a chave)</small>
        </div>

        <button class="btn-s" style="margin-top: 10px;" onclick="closeM()">Sair</button>
    </div>
</div>

    <script src="/peerjs.min.js"></script>
    <script>
	if (typeof Peer === 'undefined') {
    	console.warn('PeerJS local não encontrado. Carregando via CDN...');
    	var sdk = document.createElement('script');
    	sdk.src = "https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js";
    	document.head.appendChild(sdk);
  	} else {
    	console.log('PeerJS carregado localmente com sucesso.');
  	}
    </script>



<script>
    function copyDevPix() {
        const key = "2c04642f-fbb7-40b0-9efb-434184b133f4";
        navigator.clipboard.writeText(key);
        alert("Chave do Desenvolvedor copiada! Gratidão pelo apoio.");
    }
</script>	
    <script>
        let db = JSON.parse(localStorage.getItem('gpx_db')) || [];
        let peer, active, isHost = false;

        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function toggleTheme() { const h = document.documentElement; h.setAttribute('data-theme', h.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }
        function toggleSide() { document.body.classList.toggle('menu-right'); }

        function conn(mode) {
            const id = mode === 'host' ? document.getElementById('ho-id').value : document.getElementById('in-id').value;
            if(!id) return; closeM();
            peer = new Peer(mode === 'host' ? id : null);
            peer.on('open', () => {
                if(mode === 'client') { 
                    active = peer.connect(id); 
                    sub(active); 
                    document.body.classList.add('view-mode'); // Ativa ocultação para cliente
                }
                document.getElementById('status').innerText = "CONECTADO: " + id;
            });
            peer.on('connection', (c) => { isHost = true; active = c; sub(c); setTimeout(() => push(), 1000); });
        }

        function sub(c) {
            c.on('data', (d) => {
                if(d.type === 'db') { 
                    db = d.data; 
                    document.body.classList.add('view-mode'); // Garante que o cliente não veja botões de dono
                    render(); updFilt(); 
                }
                if(d.type === 'chat') { addMsg(d.data, 'them'); document.getElementById('notif').style.display='inline'; }
                if(d.type === 'req') push();
            });
        }

        function push() { if(active && isHost) active.send({type:'db', data:db}); }

        function render() {
            const list = document.getElementById('list');
            const q = document.getElementById('srch').value.toLowerCase();
            const f = document.getElementById('filt').value;
            const res = db.filter(p => p.name.toLowerCase().includes(q) && (f === 'Tudo' || p.cat === f));

            list.innerHTML = res.map(p => `
                <div class="card">
                    ${p.img ? `<img src="${p.img}">` : `<div style="height:110px;background:#eee;border-radius:8px"></div>`}
                    <small style="font-weight:bold; color:var(--primary)">${p.cat}</small>
                    <strong style="font-size:0.85rem">${p.name}</strong>
                    <span style="color:var(--primary); font-weight:bold">R$ ${parseFloat(p.price).toFixed(2)}</span>
                    <button class="btn-p" style="padding:6px; font-size:0.8rem" onclick="openPay('${p.id}')">🛒 Comprar</button>
                    <div class="card-admin-btns" style="display:flex; gap:4px; margin-top:5px">
                        <button class="btn-s" style="padding:4px" onclick="openEdit('${p.id}')">✏️</button>
                        <button class="btn-s" style="padding:4px; color:var(--danger)" onclick="del('${p.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function openEdit(id = null) {
            if(id) {
                const p = db.find(x => x.id == id);
                document.getElementById('e-id').value = p.id; document.getElementById('e-n').value = p.name;
                document.getElementById('e-c').value = p.cat; document.getElementById('e-p').value = p.price;
                document.getElementById('e-x').value = p.pix;
            } else {
                document.getElementById('e-id').value = ''; document.querySelectorAll('#m-edit input').forEach(i => i.value = '');
            }
            openM('m-edit');
        }

        function save() {
            const id = document.getElementById('e-id').value;
            const file = document.getElementById('e-i').files[0];
            const act = (img = null) => {
                const p = { id: id || Date.now(), name: document.getElementById('e-n').value, cat: document.getElementById('e-c').value || 'Geral', price: document.getElementById('e-p').value, pix: document.getElementById('e-x').value, img: img || (id ? db.find(x => x.id == id).img : null) };
                if(id) db = db.map(x => x.id == id ? p : x); else db.push(p);
                localStorage.setItem('gpx_db', JSON.stringify(db));
                closeM(); render(); updFilt(); push();
            };
            if(file) { const r = new FileReader(); r.onload = e => act(e.target.result); r.readAsDataURL(file); } else act();
        }

        function del(id) { if(confirm("Apagar?")) { db = db.filter(x => x.id != id); localStorage.setItem('gpx_db', JSON.stringify(db)); render(); updFilt(); push(); } }
        function openPay(id) { const p = db.find(x => x.id == id); document.getElementById('p-n').innerText = p.name; document.getElementById('p-x').innerText = p.pix; document.getElementById('p-p').innerText = "R$ " + parseFloat(p.price).toFixed(2); openM('m-pay'); }
        function updFilt() { const cats = ['Tudo', ...new Set(db.map(x => x.cat))]; document.getElementById('filt').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join(''); }
        function toggleChat() { const w = document.getElementById('chat-win'); w.style.display = w.style.display === 'flex' ? 'none' : 'flex'; document.getElementById('notif').style.display='none'; }
        function sendChat() { const i = document.getElementById('chat-i'); if(!i.value || !active) return; active.send({type: 'chat', data: i.value}); addMsg(i.value, 'me'); i.value = ''; }
        function addMsg(t, s) { const d = document.createElement('div'); d.innerText = t; d.style.padding = '8px'; d.style.borderRadius = '8px'; d.style.maxWidth = '80%'; d.style.alignSelf = s === 'me' ? 'flex-end' : 'flex-start'; d.style.background = s === 'me' ? 'var(--primary)' : 'var(--border)'; d.style.color = s === 'me' ? 'white' : 'var(--text)'; document.getElementById('msgs').appendChild(d); const m = document.getElementById('msgs'); m.scrollTop = m.scrollHeight; }
        function copy() { navigator.clipboard.writeText(document.getElementById('p-x').innerText); alert("Copiado!"); }
        function exportData() { const a=document.createElement('a'); a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(db)); a.download="gestaopix.json"; a.click(); }
        function importData(e) { const r=new FileReader(); r.onload=ev => { db=JSON.parse(ev.target.result); localStorage.setItem('gpx_db', JSON.stringify(db)); render(); updFilt(); push(); }; r.readAsText(e.target.files[0]); }
        
        window.onload = () => { updFilt(); render(); };
    </script>
</body>
</html>
